name: Deploy Edge Functions

# Sobe as edge functions (sync-football, send-push, ...) para produção
# automaticamente sempre que o código delas mudar no push para main.
# Pré-requisito: secret SUPABASE_ACCESS_TOKEN no repositório (Settings > Secrets).

on:
  push:
    branches: [main]
    paths:
      - "supabase/functions/**"
      - "supabase/config.toml"
      - ".github/workflows/deploy-functions.yml"
  workflow_dispatch: {} # permite rodar manualmente pela aba Actions

concurrency:
  group: deploy-edge-functions
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy de todas as edge functions
        run: supabase functions deploy --project-ref vblvfbjqvmunlkehpafj
